<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040d18"/>
      <stop offset="50%" stop-color="#071628"/>
      <stop offset="100%" stop-color="#040d18"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0c4a6e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#040d18" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#164e63" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#040d18" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="360" cy="250" rx="500" ry="350" fill="url(#glow)"/>
  <ellipse cx="960" cy="440" rx="350" ry="250" fill="url(#glow2)"/>

  <!-- Subtle horizontal rule lines -->
  <g opacity="0.04" stroke="#2dd4bf" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
  </g>

  <!-- Decorative circles (wellness orbs) -->
  <circle cx="1050" cy="180" r="120" fill="none" stroke="#2dd4bf" stroke-width="1" opacity="0.08"/>
  <circle cx="1050" cy="180" r="80" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.1"/>
  <circle cx="1050" cy="180" r="45" fill="none" stroke="#2dd4bf" stroke-width="1.5" opacity="0.15"/>
  <circle cx="1050" cy="180" r="15" fill="#2dd4bf" opacity="0.2"/>

  <!-- Left accent line -->
  <rect x="80" y="160" width="3" height="310" rx="1.5" fill="url(#tealGrad)" opacity="0.7"/>

  <!-- Badge -->
  <rect x="100" y="155" width="260" height="30" rx="15" fill="#0c4a6e" opacity="0.8"/>
  <text x="230" y="175" font-family="Arial, sans-serif" font-size="12" fill="#2dd4bf"
        font-weight="700" letter-spacing="2" text-anchor="middle">MENTAL WELLNESS PLATFORM</text>

  <!-- Cloud/angel icon area -->
  <text x="100" y="255" font-family="Arial, sans-serif" font-size="48" fill="#2dd4bf" opacity="0.3">&#9728;</text>

  <!-- Main title -->
  <text x="100" y="310" font-family="'Arial Black', Arial, sans-serif" font-size="90"
        font-weight="900" fill="url(#titleGrad)">Angel Cloud</text>

  <!-- Tagline -->
  <text x="100" y="360" font-family="Arial, sans-serif" font-size="22" fill="#94a3b8">
    Local AI  ·  Privacy-first  ·  Built for real people
  </text>

  <!-- Feature pills row -->
  <rect x="100" y="390" width="130" height="28" rx="14" fill="#0c4a6e" opacity="0.7"/>
  <text x="165" y="408" font-family="Arial, sans-serif" font-size="12" fill="#2dd4bf"
        text-anchor="middle" font-weight="600">AI CHAT</text>

  <rect x="242" y="390" width="130" height="28" rx="14" fill="#0c4a6e" opacity="0.7"/>
  <text x="307" y="408" font-family="Arial, sans-serif" font-size="12" fill="#38bdf8"
        text-anchor="middle" font-weight="600">WEAVIATE RAG</text>

  <rect x="384" y="390" width="130" height="28" rx="14" fill="#0c4a6e" opacity="0.7"/>
  <text x="449" y="408" font-family="Arial, sans-serif" font-size="12" fill="#2dd4bf"
        text-anchor="middle" font-weight="600">STORYTELLER</text>

  <rect x="526" y="390" width="130" height="28" rx="14" fill="#0c4a6e" opacity="0.7"/>
  <text x="591" y="408" font-family="Arial, sans-serif" font-size="12" fill="#38bdf8"
        text-anchor="middle" font-weight="600">LEADERBOARD</text>

  <!-- Privacy commands -->
  <rect x="100" y="440" width="560" height="80" rx="10" fill="#030c16" opacity="0.8"
        stroke="#0f3460" stroke-width="1"/>
  <text x="125" y="463" font-family="'Courier New', monospace" font-size="14" fill="#2dd4bf">OPTOUT</text>
  <text x="235" y="463" font-family="'Courier New', monospace" font-size="14" fill="#6b7280">  ANON</text>
  <text x="330" y="463" font-family="'Courier New', monospace" font-size="14" fill="#6b7280">  FORGET</text>
  <text x="125" y="488" font-family="Arial, sans-serif" font-size="11" fill="#4a5568">User-controlled privacy commands  ·  your data, your rules</text>

  <!-- Live indicator -->
  <circle cx="115" cy="543" r="6" fill="#2dd4bf" opacity="0.9">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="130" y="548" font-family="'Courier New', monospace" font-size="13" fill="#94a3b8">
    shanebrain-1.tail202c1a.ts.net  ·  Port 4200  ·  FastAPI
  </text>

  <!-- GitHub -->
  <text x="100" y="575" font-family="'Courier New', monospace" font-size="16" fill="#4a5568">
    github.com/thebardchat/angel-cloud
  </text>

  <!-- Footer bar -->
  <rect x="0" y="600" width="1200" height="30" fill="#030c16" opacity="0.9"/>
  <text x="600" y="619" font-family="Arial, sans-serif" font-size="11" fill="#3d5a78"
        text-anchor="middle" letter-spacing="1">
    Built by Shane Brazelton + Claude Anthropic  ·  GPL v3  ·  Hazel Green, AL
  </text>
</svg>
